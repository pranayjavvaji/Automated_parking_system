<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera List - Parking System</title>
    <style>
        /* Keep your existing CSS from camera_list.html here! */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a2980, #26d0ce); min-height: 100vh; padding: 20px; }
        .container { background: white; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); padding: 30px; margin: 0 auto; max-width: 1200px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #e9ecef; }
        h1 { color: #2c3e50; }
        .back-btn { padding: 10px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .cameras-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .camera-card { background: #f8f9fa; border-radius: 10px; padding: 20px; border-left: 5px solid #667eea; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .camera-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #dee2e6; padding-bottom: 10px; }
        .role-badge { background: #e7f3ff; color: #0d6efd; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; text-decoration: none; font-size: 0.9rem; text-align: center; flex: 1; }
        .btn-edit { background: #ffc107; color: #000; }
        .btn-zones { background: #0dcaf0; color: #000; }
        .btn-delete { background: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📹 Connected Cameras</h1>
            <a href="/" class="back-btn">← Back to Main Menu</a>
        </div>
        <div id="camerasContainer">Loading...</div>
    </div>
    
    <script>
        async function loadCameras() {
            const container = document.getElementById('camerasContainer');
            try {
                const response = await fetch('/api/list-cameras');
                const result = await response.json();
                
                if (result.success && result.cameras.length > 0) {
                    let html = '<div class="cameras-grid">';
                    result.cameras.forEach(cam => {
                        
                        // 🧠 SMART UI LOGIC: Only show zones info/button if it's a parking lot
                        let zonesInfo = '';
                        let zonesBtn = '';
                        
                        if (cam.camera_role === 'parking_lot') {
                            zonesInfo = `<p><strong>Active Spaces:</strong> ${cam.total_zones}</p>`;
                            zonesBtn = `<a href="/plots_edit/${cam.id}" class="btn btn-zones">📐 Zones</a>`;
                        }

                        html += `
                            <div class="camera-card">
                                <div class="camera-header">
                                    <h3>${cam.camera_name}</h3>
                                    <span class="role-badge">${cam.camera_role.toUpperCase()}</span>
                                </div>
                                <p><strong>IP:</strong> ${cam.ip_address || 'Custom'}</p>
                                <p><strong>Brand:</strong> ${cam.camera_brand || 'N/A'}</p>
                                ${zonesInfo} <p><strong>Status:</strong> ${cam.is_active ? '🟢 Online' : '🔴 Offline'}</p>
                                <div class="action-btns">
                                    <a href="/camera_edit/${cam.id}" class="btn btn-edit">⚙️ Settings</a>
                                    ${zonesBtn} <button onclick="deleteCamera(${cam.id})" class="btn btn-delete">🗑️</button>
                                </div>
                            </div>
                        `;
                    });
                    container.innerHTML = html + '</div>';
                } else {
                    container.innerHTML = `<h3>No Cameras Found. Add one via Plotting or Gates!</h3>`;
                }
            } catch (error) {
                container.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            }
        }
        
        async function deleteCamera(id) {
            if (!confirm("⚠️ Deleting this camera will delete all its Parking Spaces and Gates. Proceed?")) return;
            try {
                const res = await fetch(`/api/delete-camera/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) { alert("Deleted!"); loadCameras(); } 
                else { alert("Error: " + data.error); }
            } catch(e) { alert("Connection failed."); }
        }
        
        document.addEventListener('DOMContentLoaded', loadCameras);
    </script>
</body>
</html>
