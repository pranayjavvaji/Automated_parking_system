<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking System - Main Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2980, #26d0ce);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        
        .header {
            margin-bottom: 40px;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #1a2980, #26d0ce);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 1.2rem;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin: 30px 0;
        }
        
        .btn {
            padding: 20px 30px;
            font-size: 1.3rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-decoration: none;
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #2980b9, #1c6ea4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        
        .btn-success:hover {
            background: linear-gradient(135deg, #27ae60, #219955);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #e67e22, #d35400);
        }
        
        .btn-warning:hover {
            background: linear-gradient(135deg, #d35400, #ba4a00);
        }
        
        .btn-info {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
        }
        
        .btn-info:hover {
            background: linear-gradient(135deg, #8e44ad, #7d3c98);
        }
        
        .btn-icon {
            font-size: 1.5rem;
        }
        
        .footer {
            margin-top: 40px;
            color: #95a5a6;
            font-size: 0.9rem;
        }
        
        .logo {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #1a2980;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Parking System</h1>
            <p class="subtitle">Smart Parking Management System</p>
        </div>
        
        <div class="button-grid">
            <button class="btn btn-primary" onclick="handleOldUrls()">
                
                Start with Old URLs
            </button>
            <a href="/dashboard" class="btn btn-success" style="font-size: 1.5rem; padding: 25px;">
                ▶️ Go to Live Detection Dashboard
            </a>
            
            <button class="btn btn-success" onclick="handleNewUrls()">
            
                Start after Adding Current URLs
            </button>
            
            <a href="/plotting" class="btn btn-warning">
              
                Set up a parking Camera
            </a>
            <a href="/gates" class="btn btn-warning" style="background: linear-gradient(135deg, #FF512F, #DD2476);">
                 Set up Entry/Exit Gates
            </a>
            <a href="/cameras" class="btn btn-info">
             
                Edit Camera Information and Slot
            </a>
        </div>
        
        <div class="footer">
            <p>sSmart Parking Detection System</p>
            <p>Select an option to continue</p>
        </div>
    </div>

    <script>
        function handleOldUrls() {
            alert("Starting with old URLs...\nThis feature will load previously saved configurations.");
            // You can add more functionality here, like redirecting to a specific page
        }
        
        function handleNewUrls() {
            alert("Starting with current URLs...\nThis feature will prompt for new camera URLs.");
            // You can add more functionality here
        }
        
        function handleEditCamera() {
            alert("Opening camera editor...\nThis feature will allow you to modify existing camera setups.");
            // You can add more functionality here, like showing a list of cameras
        }
    </script>
</body>
</html>
