<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Setup - Parking System</title>
    <style>
        /* Exact styles from plotting.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        h1 { text-align: center; padding: 25px; background: linear-gradient(90deg, #1e3c72, #2a5298); color: white; margin-bottom: 20px; }
        
        .upload-section { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 20px; background: #f8f9fa; border-bottom: 2px solid #e9ecef; }
        .upload-section input { padding: 10px 15px; border: 2px solid #1e3c72; border-radius: 8px; background: white; min-width: 120px; flex: 1; }
        .upload-section button { padding: 10px 25px; background: linear-gradient(90deg, #1e3c72, #2a5298); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: transform 0.2s; white-space: nowrap; }
        .upload-section button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .main-content { display: flex; padding: 20px; gap: 30px; min-height: 600px; }
        .image-container { flex: 3; position: relative; border: 2px solid #e9ecef; border-radius: 10px; padding: 15px; background: #f8f9fa; }
        .instructions { text-align: center; margin-bottom: 15px; color: #6c757d; font-style: italic; }
        #imageCanvas { width: 100%; height: 500px; border: 2px solid #ced4da; border-radius: 8px; background: white; cursor: crosshair; display: block; }
        .coordinates-display { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; border: 1px solid #dee2e6; min-height: 80px; }
        
        .controls { flex: 1; min-width: 300px; }
        #gateList { max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding: 10px; background: white; border-radius: 8px; border: 1px solid #dee2e6; }
        
        .gate-item { padding: 10px; margin: 5px 0; background: #e3f2fd; border-radius: 5px; border-left: 4px solid #2196f3; }
        .gate-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .gate-item h4 { color: #495057; margin-bottom: 5px; }
        .delete-btn { background: none; border: none; color: red; font-weight: bold; cursor: pointer; }
        
        .db-section { display: flex; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #dee2e6; }
        .db-section button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; }
        .db-section button:hover { background: #218838; }
        
        .point-coord { margin: 5px 0; padding: 5px; background: #f8f9fa; border-radius: 4px; border-left: 3px solid #2196f3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚧 Entry/Exit Gate Setup</h1>
        <div style="text-align: right; margin-bottom: 10px;">
            <a href="/" style="text-decoration: none; color: #1e3c72; font-weight: bold;">← Back to Main Menu</a>
        </div>
        
        <div class="upload-section">
            <input type="text" id="dvrName" placeholder="DVR Name (e.g., Main_Gate)">
            <input type="text" id="streamUrl" placeholder="SmartPSS URL">
            <input type="number" id="channelNumber" placeholder="Channel" min="1" max="8">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            
            <button id="captureBtn">Capture Frame</button>
            <button id="resetBtn">Reset All</button>
        </div>
        
        <div class="main-content">
            <div class="image-container">
                <div class="instructions">
                    <p>Enter details above, click "Capture Frame", then <b>click and drag</b> to draw counting lines.</p>
                </div>
                <canvas id="imageCanvas"></canvas>
                <div class="coordinates-display" id="coordinatesDisplay">
                    <h4>Status:</h4>
                    <div class="point-coord">Ready...</div>
                </div>
            </div>
            
            <div class="controls">
                <h3>Active Gates</h3>
                <div id="gateList"></div>
                
                <div class="output-section">
                    <div class="db-section">
                        <button id="saveToDbBtn">Save Gates to DB</button>
                        <button id="loadFromDbBtn" style="background: #17a2b8;">Load from DB</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        class GateSelector {
            constructor() {
                this.canvas = document.getElementById('imageCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gates = [];
                this.currentImage = null;
                this.imageScale = 1;
                this.canvasRect = null;
                
                // Drawing state
                this.isDrawing = false;
                this.startX = 0;
                this.startY = 0;
                this.currentX = 0;
                this.currentY = 0;
                
                this.initializeEventListeners();
                window.addEventListener('resize', () => { this.canvasRect = null; });
            }
            
            initializeEventListeners() {
                document.getElementById('captureBtn').addEventListener('click', async () => {
                    await this.captureFrameFromStream();
                });
                
                this.canvas.addEventListener('mousedown', (e) => this.startDrawing(e));
                this.canvas.addEventListener('mousemove', (e) => this.drawing(e));
                this.canvas.addEventListener('mouseup', (e) => this.stopDrawing(e));
                
                document.getElementById('resetBtn').addEventListener('click', () => {
                    if(confirm("Delete all gates?")) {
                        this.gates = [];
                        this.drawScene();
                        this.updateGateList();
                    }
                });
                
                document.getElementById('saveToDbBtn').addEventListener('click', () => this.saveToDatabase());
                document.getElementById('loadFromDbBtn').addEventListener('click', () => this.loadFromDatabase());
            }

            // --- CAPTURE LOGIC (Identical to plotting.html) ---
            async captureFrameFromStream() {
                const streamUrl = document.getElementById('streamUrl').value;
                const channel = document.getElementById('channelNumber').value;
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                if (!streamUrl) { alert('Please enter a SmartPSS URL'); return; }
                
                this.updateStatus('Connecting to RTSP stream...');
                
                try {
                    const response = await fetch('/capture-frame', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            url: streamUrl,
                            channel: parseInt(channel) || 1,
                            username: username,
                            password: password
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        await this.loadImageFromBase64(result.image);
                        this.updateStatus('Frame captured! Draw lines to create gates.');
                    } else {
                        alert('Capture failed: ' + result.error);
                        // Optional: Load test image on failure
                        this.loadTestImage();
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Connection failed. Loading test image...');
                    this.loadTestImage();
                }
            }

            // --- DRAWING LOGIC (Adapted for Lines) ---
            startDrawing(e) {
                if (!this.currentImage) { alert('Please capture a frame first'); return; }
                const coords = this.getCanvasCoordinates(e);
                this.startX = coords.canvasX;
                this.startY = coords.canvasY;
                this.isDrawing = true;
            }
            
            drawing(e) {
                if (!this.isDrawing) return;
                const coords = this.getCanvasCoordinates(e);
                this.currentX = coords.canvasX;
                this.currentY = coords.canvasY;
                this.drawScene(); // Redraw image + existing gates
                
                // Draw Preview Line
                this.ctx.beginPath();
                this.ctx.moveTo(this.startX, this.startY);
                this.ctx.lineTo(this.currentX, this.currentY);
                this.ctx.strokeStyle = 'yellow';
                this.ctx.lineWidth = 4;
                this.ctx.stroke();
            }
            
            stopDrawing(e) {
                if (!this.isDrawing) return;
                this.isDrawing = false;
                
                // Calculate length to avoid tiny clicks
                const dist = Math.hypot(this.currentX - this.startX, this.currentY - this.startY);
                
                if (dist > 20) {
                    const name = prompt("Enter Gate Name (e.g., Entry, Exit):", "Gate " + (this.gates.length + 1));
                    if(name) {
                        this.gates.push({
                            name: name,
                            line: [Math.round(this.startX), Math.round(this.startY), Math.round(this.currentX), Math.round(this.currentY)],
                            direction: 'both'
                        });
                        this.updateGateList();
                    }
                }
                this.drawScene();
            }

            drawScene() {
                if (!this.currentImage) return;
                
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.drawImage(this.currentImage, 0, 0, this.currentImage.width, this.currentImage.height, 0, 0, this.canvas.width, this.canvas.height);
                
                this.gates.forEach(g => {
                    const [x1, y1, x2, y2] = g.line;
                    
                    // Draw Line
                    this.ctx.beginPath();
                    this.ctx.moveTo(x1, y1);
                    this.ctx.lineTo(x2, y2);
                    this.ctx.strokeStyle = '#2196f3';
                    this.ctx.lineWidth = 5;
                    this.ctx.stroke();
                    
                    // Draw Dots at ends
                    this.ctx.fillStyle = 'red';
                    this.ctx.beginPath(); this.ctx.arc(x1, y1, 6, 0, Math.PI*2); this.ctx.fill();
                    this.ctx.beginPath(); this.ctx.arc(x2, y2, 6, 0, Math.PI*2); this.ctx.fill();
                    
                    // Draw Name
                    this.ctx.fillStyle = 'white';
                    this.ctx.font = 'bold 16px Arial';
                    this.ctx.strokeStyle = 'black';
                    this.ctx.lineWidth = 3;
                    this.ctx.strokeText(g.name, x1, y1 - 10);
                    this.ctx.fillText(g.name, x1, y1 - 10);
                });
            }

            updateGateList() {
                const list = document.getElementById('gateList');
                list.innerHTML = '';
                this.gates.forEach((g, idx) => {
                    list.innerHTML += `
                        <div class="gate-item">
                            <div class="gate-header">
                                <h4>${g.name}</h4>
                                <button class="delete-btn" onclick="app.removeGate(${idx})">🗑️</button>
                            </div>
                            <p>Coords: (${g.line[0]},${g.line[1]}) to (${g.line[2]},${g.line[3]})</p>
                        </div>
                    `;
                });
            }

            removeGate(idx) {
                if(confirm("Remove this gate?")) {
                    this.gates.splice(idx, 1);
                    this.updateGateList();
                    this.drawScene();
                }
            }

            // --- DATABASE ---
            async saveToDatabase() {
                const dvr = document.getElementById('dvrName').value;
                if(!dvr) return alert("Enter DVR Name!");
                
                try {
                    const res = await fetch('/api/save-gates', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ dvr_name: dvr, gates: this.gates })
                    });
                    const data = await res.json();
                    alert(data.success ? "Saved Successfully!" : "Error: " + data.error);
                } catch(e) { console.error(e); alert("Save failed"); }
            }

            async loadFromDatabase() {
                const dvr = document.getElementById('dvrName').value;
                if(!dvr) return alert("Enter DVR Name!");

                try {
                    const res = await fetch('/api/load-gates', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ dvr_name: dvr })
                    });
                    const data = await res.json();
                    if(data.success) {
                        this.gates = data.gates;
                        this.updateGateList();
                        this.drawScene();
                        this.updateStatus(`Loaded ${this.gates.length} gates.`);
                    } else {
                        alert("Error loading: " + data.error);
                    }
                } catch(e) { console.error(e); alert("Load failed"); }
            }

            // --- HELPERS (Same as plotting.html) ---
            updateStatus(msg) { document.getElementById('coordinatesDisplay').innerHTML = `<h4>Status:</h4><div class="point-coord">${msg}</div>`; }
            
            getCanvasCoordinates(e) {
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                return {
                    canvasX: (e.clientX - rect.left) * scaleX,
                    canvasY: (e.clientY - rect.top) * scaleY
                };
            }

            async loadImageFromBase64(base64String) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        this.currentImage = img;
                        this.fitCanvasToImage(img);
                        this.drawScene();
                        resolve();
                    };
                    img.src = `data:image/jpeg;base64,${base64String}`;
                });
            }

            fitCanvasToImage(img) {
                const container = this.canvas.parentElement;
                const maxWidth = container.clientWidth - 40;
                const maxHeight = 500;
                let dw = img.width, dh = img.height;
                
                if (dw > maxWidth) { dh = (maxWidth / dw) * dh; dw = maxWidth; }
                if (dh > maxHeight) { dw = (maxHeight / dh) * dw; dh = maxHeight; }
                
                this.canvas.style.width = dw + 'px';
                this.canvas.style.height = dh + 'px';
                this.canvas.width = img.width;
                this.canvas.height = img.height;
                setTimeout(() => this.drawScene(), 50);
            }

            loadTestImage() {
                const c = document.createElement('canvas');
                c.width = 1280; c.height = 720;
                const cx = c.getContext('2d');
                cx.fillStyle = "#333"; cx.fillRect(0,0,1280,720);
                cx.fillStyle = "white"; cx.font="40px Arial"; cx.fillText("TEST MODE", 500, 360);
                this.loadImageFromBase64(c.toDataURL().split(',')[1]);
            }
        }
        
        const app = new GateSelector();
    </script>
</body>
</html>
