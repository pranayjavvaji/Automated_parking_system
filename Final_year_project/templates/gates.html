<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Zone Setup - Parking System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        h1 { text-align: center; padding: 25px; background: linear-gradient(90deg, #1e3c72, #2a5298); color: white; margin-bottom: 20px; }
        
        .upload-section { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 20px; background: #f8f9fa; border-bottom: 2px solid #e9ecef; }
        .upload-section input { padding: 10px 15px; border: 2px solid #1e3c72; border-radius: 8px; background: white; min-width: 120px; flex: 1; }
        .upload-section button { padding: 10px 25px; background: linear-gradient(90deg, #1e3c72, #2a5298); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: transform 0.2s; white-space: nowrap; }
        .upload-section button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .main-content { display: flex; padding: 20px; gap: 30px; min-height: 600px; }
        .image-container { flex: 3; position: relative; border: 2px solid #e9ecef; border-radius: 10px; padding: 15px; background: #f8f9fa; }
        .instructions { text-align: center; margin-bottom: 15px; color: #6c757d; font-style: italic; }
        #imageCanvas { width: 100%; height: 500px; border: 2px solid #ced4da; border-radius: 8px; background: white; cursor: crosshair; display: block; }
        .coordinates-display { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; border: 1px solid #dee2e6; min-height: 80px; }
        
        .controls { flex: 1; min-width: 300px; }
        #gateList { max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding: 10px; background: white; border-radius: 8px; border: 1px solid #dee2e6; }
        
        .gate-item { padding: 10px; margin: 5px 0; background: #e3f2fd; border-radius: 5px; border-left: 4px solid #2196f3; }
        .gate-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .gate-item h4 { color: #495057; margin-bottom: 5px; }
        .delete-btn { background: none; border: none; color: red; font-weight: bold; cursor: pointer; }
        
        .db-section { display: flex; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #dee2e6; }
        .db-section button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; }
        .db-section button:hover { background: #218838; }
        
        .point-coord { margin: 5px 0; padding: 5px; background: #f8f9fa; border-radius: 4px; border-left: 3px solid #2196f3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚧 Entry/Exit Gate Zone Setup</h1>
        <div style="text-align: right; margin-bottom: 10px;">
            <a href="/" style="text-decoration: none; color: #1e3c72; font-weight: bold;">← Back to Main Menu</a>
        </div>
        
        <div class="upload-section">
            <input type="text" id="cameraName" placeholder="Camera Name (e.g., Main Gate)" style="max-width: 180px;">
            <select id="cameraBrand" onchange="toggleBrandInputs()" style="padding: 10px; border-radius: 8px; border: 2px solid #1e3c72; font-weight: bold;">
                <option value="dahua">Dahua / CP Plus</option>
                <option value="hikvision">Hikvision</option>
                <option value="custom">Custom Link</option>
            </select>
            
            <div id="standardInputs" style="display: flex; gap: 10px; flex: 1;">
                <input type="text" id="cameraIp" placeholder="IP (192.168.1.108)">
                <input type="text" id="rtspPort" placeholder="Port" value="554" style="max-width: 70px;">
                <input type="number" id="channelNumber" placeholder="CH" min="1" value="1" style="max-width: 60px;">
                <input type="text" id="username" placeholder="User" value="admin" style="max-width: 90px;">
                <input type="password" id="password" placeholder="Pass" style="max-width: 100px;">
            </div>
            
            <div id="customInput" style="display: none; flex: 1;">
                <input type="text" id="customUrl" placeholder="Paste full custom RTSP link here..." style="width: 100%;">
            </div>

            <select id="gateDirection" style="padding: 10px; border-radius: 8px; font-weight: bold;">
                <option value="entry_overview">🟢 Entry Gate (Overview)</option>
                <option value="entry_lpr">📸 Entry Gate (Plate Reader)</option>
                <option value="exit_overview">🔴 Exit Gate (Overview)</option>
                <option value="exit_lpr">📸 Exit Gate (Plate Reader)</option>
            </select>
            
            <button id="captureBtn">Capture Frame</button>
            <button id="resetBtn">Reset All</button>
        </div>
        
        <div class="main-content">
            <div class="image-container">
                <div class="instructions" id="instructionText">
                    <p>Enter details above, click "Capture Frame", then <b>CLICK 4 POINTS</b> to draw a detection zone polygon.</p>
                </div>
                <canvas id="imageCanvas"></canvas>
                <div class="coordinates-display" id="coordinatesDisplay">
                    <h4>Status:</h4>
                    <div class="point-coord">Ready...</div>
                </div>
            </div>
            
            <div class="controls">
                <h3>Active Zones</h3>
                <div id="gateList"></div>
                
                <div class="output-section">
                    <div class="db-section">
                        <button id="saveToDbBtn">Save Zones to DB</button>
                        <button id="loadFromDbBtn" style="background: #17a2b8;">Load from DB</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function toggleBrandInputs() {
            const brand = document.getElementById('cameraBrand').value;
            document.getElementById('standardInputs').style.display = brand === 'custom' ? 'none' : 'flex';
            document.getElementById('customInput').style.display = brand === 'custom' ? 'block' : 'none';
        }

        function buildRtspUrl() {
            const brand = document.getElementById('cameraBrand').value;
            if (brand === 'custom') return document.getElementById('customUrl').value;
            
            const ip = document.getElementById('cameraIp').value;
            const port = document.getElementById('rtspPort').value;
            const user = document.getElementById('username').value;
            const pass = encodeURIComponent(document.getElementById('password').value);
            const ch = document.getElementById('channelNumber').value;
            
            if(!ip || !user || !pass) return null;
            
            if (brand === 'dahua') return `rtsp://${user}:${pass}@${ip}:${port}/cam/realmonitor?channel=${ch}&subtype=1`;
            if (brand === 'hikvision') return `rtsp://${user}:${pass}@${ip}:${port}/Streaming/Channels/${ch}02`;
        }

        class GateSelector {
            constructor() {
                this.canvas = document.getElementById('imageCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gates = [];
                this.currentImage = null;
                
                // 4-Point Polygon State
                this.currentPoints = [];
                this.mouseX = 0;
                this.mouseY = 0;
                
                this.initializeEventListeners();
            }
            
            initializeEventListeners() {
                document.getElementById('captureBtn').addEventListener('click', async () => {
                    await this.captureFrameFromStream();
                });
                
                // New Click-to-Drop-Point logic
                this.canvas.addEventListener('mousedown', (e) => this.handleClick(e));
                this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                
                document.getElementById('resetBtn').addEventListener('click', () => {
                    if(confirm("Delete all zones?")) {
                        this.gates = [];
                        this.currentPoints = [];
                        this.drawScene();
                        this.updateGateList();
                        this.updateInstruction();
                    }
                });
                
                document.getElementById('saveToDbBtn').addEventListener('click', () => this.saveToDatabase());
                document.getElementById('loadFromDbBtn').addEventListener('click', () => this.loadFromDatabase());
            }

            async captureFrameFromStream() {
                const finalUrl = buildRtspUrl();
                if (!finalUrl) return alert("Please fill URL details");
                
                this.updateStatus('Connecting...');
                try {
                    const response = await fetch('/capture-frame', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: finalUrl })
                    });
                    const result = await response.json();
                    if (result.success) this.loadImage(result.image);
                    else alert('Capture failed: ' + result.error);
                } catch(e) {
                    alert('Connection Failed');
                }
            }

            // ------------------------------------------------------------------
            // DRAWING LOGIC (The 4-Point Polygon)
            // ------------------------------------------------------------------
            handleClick(e) {
                if (!this.currentImage) return alert('Please capture a frame first');
                
                const coords = this.getCanvasCoordinates(e);
                this.currentPoints.push({ x: Math.round(coords.canvasX), y: Math.round(coords.canvasY) });
                
                if (this.currentPoints.length === 4) {
                    // Polygon finished!
                    const name = prompt("Enter Zone Name (e.g., Entry Trigger):", "Zone " + (this.gates.length + 1));
                    if(name) {
                        this.gates.push({
                            name: name,
                            points: [...this.currentPoints]
                        });
                        this.updateGateList();
                    }
                    this.currentPoints = []; // Reset for next polygon
                }
                
                this.updateInstruction();
                this.drawScene();
            }
            
            handleMouseMove(e) {
                if (this.currentPoints.length > 0 && this.currentPoints.length < 4) {
                    const coords = this.getCanvasCoordinates(e);
                    this.mouseX = coords.canvasX;
                    this.mouseY = coords.canvasY;
                    this.drawScene();
                }
            }
            
            updateInstruction() {
                const textObj = document.getElementById('instructionText');
                if (this.currentPoints.length === 0) {
                    textObj.innerHTML = `<p>Click <b>4 points</b> on the image to draw a Detection Zone.</p>`;
                } else {
                    textObj.innerHTML = `<p style="color: #ff9800; font-weight: bold;">Point ${this.currentPoints.length} set. Click ${4 - this.currentPoints.length} more times...</p>`;
                }
            }

            drawScene() {
                if (!this.currentImage) return;
                
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.drawImage(this.currentImage, 0, 0, this.currentImage.width, this.currentImage.height, 0, 0, this.canvas.width, this.canvas.height);
                
                // Draw finished gates
                this.gates.forEach(g => {
                    this.drawPolygon(g.points, '#2196f3', g.name, true);
                });
                
                // Draw in-progress polygon
                if (this.currentPoints.length > 0) {
                    // Create a temporary array that includes the current mouse position
                    const previewPoints = [...this.currentPoints, {x: this.mouseX, y: this.mouseY}];
                    this.drawPolygon(previewPoints, '#ff9800', null, false);
                    
                    // Draw dots on the clicked points
                    this.ctx.fillStyle = '#ff9800';
                    this.currentPoints.forEach(pt => {
                        this.ctx.beginPath();
                        this.ctx.arc(pt.x, pt.y, 5, 0, Math.PI*2);
                        this.ctx.fill();
                    });
                }
            }
            
            drawPolygon(pts, color, name, isFinished) {
                if (pts.length === 0) return;
                
                this.ctx.beginPath();
                this.ctx.moveTo(pts[0].x, pts[0].y);
                for(let i = 1; i < pts.length; i++) {
                    this.ctx.lineTo(pts[i].x, pts[i].y);
                }
                
                if (isFinished) {
                    this.ctx.closePath();
                    // Add semi-transparent fill
                    this.ctx.fillStyle = color + "44"; // Hex alpha
                    this.ctx.fill();
                }
                
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = 3;
                this.ctx.stroke();
                
                // Draw text label on first point
                if (name && isFinished) {
                    this.ctx.fillStyle = 'white';
                    this.ctx.font = 'bold 16px Arial';
                    this.ctx.lineWidth = 3;
                    this.ctx.strokeStyle = 'black';
                    this.ctx.strokeText(name, pts[0].x, pts[0].y - 10);
                    this.ctx.fillText(name, pts[0].x, pts[0].y - 10);
                }
            }

            updateGateList() {
                const list = document.getElementById('gateList');
                list.innerHTML = '';
                this.gates.forEach((g, idx) => {
                    list.innerHTML += `
                        <div class="gate-item">
                            <div class="gate-header">
                                <h4>${g.name}</h4>
                                <button class="delete-btn" onclick="app.removeGate(${idx})">🗑️</button>
                            </div>
                            <p style="font-size: 12px; color: #666;">Points: 4 coordinates saved.</p>
                        </div>
                    `;
                });
            }

            removeGate(idx) {
                if(confirm("Remove this zone?")) {
                    this.gates.splice(idx, 1);
                    this.updateGateList();
                    this.drawScene();
                }
            }

            // --- DATABASE INTEGRATION ---
            async saveToDatabase() {
                const camName = document.getElementById('cameraName').value;
                const finalUrl = buildRtspUrl(); 
                
                if (!camName || !finalUrl) return alert("Missing Camera Name or URL!");
                if (this.gates.length === 0) return alert("Draw at least one zone!");

                const payload = {
                    camera_name: camName,
                    camera_role: document.getElementById('gateDirection').value,
                    camera_brand: document.getElementById('cameraBrand').value,
                    ip_address: document.getElementById('cameraIp').value,
                    rtsp_port: document.getElementById('rtspPort').value,
                    channel: document.getElementById('channelNumber').value,
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    stream_url: finalUrl,
                    // Save the array of points instead of a single line
                    gates: this.gates.map(g => ({
                        spaceName: g.name,
                        points: g.points
                    }))
                };

                try {
                    const res = await fetch('/api/save-config', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    alert(data.success ? "Zones Saved Successfully!" : "Error: " + data.error);
                } catch(e) { alert("Save failed"); }
            }

            async loadFromDatabase() {
                const camName = document.getElementById('cameraName').value;
                if(!camName) return alert("Enter Camera Name to load!");

                try {
                    const res = await fetch('/api/load-config', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ camera_name: camName })
                    });
                    const data = await res.json();
                    if(data.success) {
                        const cam = data.camera;
                        if(cam) {
                            document.getElementById('cameraBrand').value = cam.camera_brand || 'custom';
                            toggleBrandInputs();
                            if (cam.camera_brand === 'custom') {
                                document.getElementById('customUrl').value = cam.stream_url || '';
                            } else {
                                document.getElementById('cameraIp').value = cam.ip_address || '';
                                document.getElementById('rtspPort').value = cam.rtsp_port || '';
                                document.getElementById('channelNumber').value = cam.channel || 1;
                                document.getElementById('username').value = cam.username || '';
                                document.getElementById('password').value = cam.password || '';
                            }
                        }

                        // Restore 4-point polygon zones
                        this.gates = (data.zones || []).map(z => ({
                            name: z.zoneName,
                            points: z.coordinates || []
                        }));
                        
                        this.updateGateList();
                        this.drawScene();
                        this.updateStatus(`Loaded ${this.gates.length} zones.`);
                    } else {
                        alert("Error loading: " + data.error);
                    }
                } catch(e) { alert("Load failed"); }
            }

            updateStatus(msg) { document.getElementById('coordinatesDisplay').innerHTML = `<h4>Status:</h4><div class="point-coord">${msg}</div>`; }
            
            getCanvasCoordinates(e) {
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                return {
                    canvasX: (e.clientX - rect.left) * scaleX,
                    canvasY: (e.clientY - rect.top) * scaleY
                };
            }

            async loadImage(base64String) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        this.currentImage = img;
                        this.fitCanvasToImage(img);
                        this.drawScene();
                        this.updateStatus('Frame ready. Click 4 points to draw.');
                        resolve();
                    };
                    img.src = `data:image/jpeg;base64,${base64String}`;
                });
            }

            fitCanvasToImage(img) {
                const container = this.canvas.parentElement;
                const maxWidth = container.clientWidth - 40;
                const maxHeight = 500;
                let dw = img.width, dh = img.height;
                
                if (dw > maxWidth) { dh = (maxWidth / dw) * dh; dw = maxWidth; }
                if (dh > maxHeight) { dw = (maxHeight / dh) * dw; dh = maxHeight; }
                
                this.canvas.style.width = dw + 'px';
                this.canvas.style.height = dh + 'px';
                this.canvas.width = img.width;
                this.canvas.height = img.height;
                setTimeout(() => this.drawScene(), 50);
            }
        }
        
        const app = new GateSelector();
    </script>
</body>
</html>
